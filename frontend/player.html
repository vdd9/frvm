<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script type="text/javascript" src="static/SwipeDetector.js"></script>
  <script type="text/javascript" src="static/common.js"></script>
  <title>FRVM</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Mono', 'Droid Sans Mono', 'Source Code Pro', monospace;
    }

    #grid {
      display: grid;
      height: 100%;
      width: 100%;
      overflow: hidden;
      grid-template-rows: repeat(var(--rows), 1fr);
      grid-template-columns: repeat(var(--cols), 1fr);
    }

    #fullscreen-btn {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(0,0,0,0.4);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 3px 6px;
      font-size: 14px;
      cursor: pointer;
      z-index: 1000;
      transition: opacity 0.3s ease;
    }

    #fullscreen-btn:hover {
      background: rgba(0,0,0,0.6);
    }

    .player-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      container-type: inline-size;
      background: black;
    }

    .player-wrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .player-wrapper video.contain {
      object-fit: contain;
    }

    .poster-layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      z-index: 2;
      pointer-events: none;
    }

    .poster-layer.visible {
      opacity: 0.5;
    }

    .toaster {
      position: absolute;
      top: 5%;
      left: 5%;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      padding: 3px 8px;
      font-size: 1.5rem;
      border-radius: 5px;
      z-index: 4;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .toaster.visible {
      opacity: 1;
    }

    .timeline-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: transparent;
      z-index: 5;
      pointer-events: none;
    }

    .timeline-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 100%;
      background: rgba(255, 105, 180, 0.9);
      width: 0%;
      transition: width 0.1s linear;
    }

    /* Categories panel */
    .categories-panel {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px;
      z-index: 6;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      pointer-events: none;
    }

    .categories-panel.visible {
      transform: translateY(0);
    }

    /* Emoji category badge */
    .cat-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      border: 3px solid transparent;
      background: rgba(50, 50, 50, 0.6);
      cursor: pointer;
      user-select: none;
    }

    .cat-badge.yes {
      border-color: #00ff00;
    }

    .cat-badge.no {
      border-color: #ff0000;
    }

    .categories-panel.visible {
      pointer-events: auto;
    }

    .validate-btn {
      background: rgba(0, 200, 0, 0.7);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 1.2rem;
      cursor: pointer;
      margin-left: 10px;
    }

    .validate-btn:hover {
      background: rgba(0, 255, 0, 0.8);
    }

    /* Compact categories panel - auto-resize to fit 2 lines */
    .categories-panel.compact .cat-badge {
      font-size: 1.4rem;
      width: 2rem;
      height: 2rem;
      border-width: 2px;
    }
    .categories-panel.compact .validate-btn {
      font-size: 1rem;
      padding: 6px 12px;
    }
    .categories-panel.very-compact .cat-badge {
      font-size: 1.1rem;
      width: 1.6rem;
      height: 1.6rem;
      border-width: 2px;
    }
    .categories-panel.very-compact .validate-btn {
      font-size: 0.9rem;
      padding: 5px 10px;
    }
    .categories-panel.ultra-compact .cat-badge {
      font-size: 0.9rem;
      width: 1.3rem;
      height: 1.3rem;
      border-width: 1px;
    }
    .categories-panel.ultra-compact .validate-btn {
      font-size: 0.8rem;
      padding: 4px 8px;
    }
    .categories-panel.compact,
    .categories-panel.very-compact,
    .categories-panel.ultra-compact {
      gap: 4px;
      padding: 6px;
    }

    /* Category tooltip overlay for mobile */
    .category-tooltip-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 1.2em;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      text-align: center;
      border: 1px solid var(--primary-color, #ff69b4);
    }
    .category-tooltip-overlay.visible {
      opacity: 1;
    }
    .category-tooltip-overlay .emoji {
      font-size: 2em;
      display: block;
      margin-bottom: 8px;
    }

    /* No Results Overlay */
    .no-results-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .no-results-overlay.hidden { display: none; }
    .no-results-overlay .icon { font-size: 4em; margin-bottom: 20px; }
    .no-results-overlay .message { 
      color: #888; 
      font-size: 1.5em; 
      text-align: center;
      max-width: 80%;
    }
    .no-results-overlay .back-btn {
      margin-top: 30px;
      padding: 12px 24px;
      background: var(--primary-color, #ff69b4);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      text-decoration: none;
    }
    .no-results-overlay .back-btn:hover { opacity: 0.9; }

    /* Performers panel - slides up from bottom */
    .performers-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 10px;
      z-index: 5;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      align-items: center;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      pointer-events: none;
      max-height: 45%;
      overflow-y: auto;
    }
    .performers-panel.visible {
      transform: translateY(0);
      pointer-events: auto;
    }

    /* Performer badge */
    .perf-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 16px;
      background: rgba(50, 50, 50, 0.7);
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
      position: relative;
    }
    .perf-badge.active {
      outline: 3px solid #00ff00;
      outline-offset: -3px;
    }
    .perf-badge.inactive {
      outline: 2px dashed #555;
      outline-offset: -2px;
      opacity: 0.7;
    }
    .perf-badge img {
      width: clamp(40px, 25cqi, 160px);
      height: clamp(40px, 25cqi, 160px);
      border-radius: 12px;
      object-fit: cover;
    }
    /* Tooltip on hover */
    @media (hover: hover) {
      .perf-badge::after {
        content: attr(data-name);
        position: absolute;
        bottom: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        font-size: 0.7rem;
        padding: 3px 8px;
        border-radius: 6px;
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
        z-index: 20;
      }
      .perf-badge:hover::after {
        opacity: 1;
      }
    }

    /* Compact performers */
    .performers-panel.compact .perf-badge img { width: clamp(32px, 20cqi, 120px); height: clamp(32px, 20cqi, 120px); }
    .performers-panel.compact .perf-badge { padding: 2px 5px; gap: 3px; }
    .performers-panel.very-compact .perf-badge img { width: clamp(24px, 15cqi, 90px); height: clamp(24px, 15cqi, 90px); }
    .performers-panel.very-compact .perf-badge { padding: 2px 3px; }
    .performers-panel.ultra-compact .perf-badge img { width: clamp(20px, 10cqi, 70px); height: clamp(20px, 10cqi, 70px); }
    .performers-panel.ultra-compact .perf-badge { padding: 1px 2px; }
    .performers-panel.compact,
    .performers-panel.very-compact,
    .performers-panel.ultra-compact { gap: 3px; padding: 4px; }

    /* Performer indicator (visible on video without opening panels) */
    .performer-indicator {
      position: absolute;
      bottom: 6px;
      left: 6px;
      background: rgba(0, 0, 0, 0.5);
      color: #ccc;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 10px;
      z-index: 7;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .performer-indicator.visible {
      opacity: 1;
      pointer-events: auto;
      cursor: pointer;
    }

    /* Performer links popup */
    .perf-links-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid var(--primary-color, #ff69b4);
      border-radius: 12px;
      padding: 16px 20px;
      z-index: 1100;
      max-width: 90vw;
      max-height: 60vh;
      overflow-y: auto;
      text-align: center;
    }
    .perf-links-popup.hidden { display: none; }
    .perf-links-popup .perf-popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 12px;
    }
    .perf-links-popup .perf-popup-header img {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
    }
    .perf-links-popup .perf-popup-header .name {
      color: #fff;
      font-size: 1.2em;
      font-weight: bold;
    }
    .perf-links-popup a {
      display: block;
      color: var(--primary-color, #ff69b4);
      text-decoration: none;
      padding: 6px 0;
      font-size: 0.9em;
      word-break: break-all;
    }
    .perf-links-popup a:hover { text-decoration: underline; }
    .perf-links-popup .close-btn {
      margin-top: 12px;
      background: #333;
      color: #aaa;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      cursor: pointer;
    }
    .perf-links-popup .close-btn:hover { color: #fff; }
    .perf-links-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1099;
    }
    .perf-links-backdrop.hidden { display: none; }
  </style>
</head>
<body>
  <div id="grid"></div>
  <button id="fullscreen-btn">⛶</button>
  <div class="no-results-overlay hidden" id="noResultsOverlay">
    <span class="icon">🔍</span>
    <p class="message">No videos match your filter criteria</p>
    <a class="back-btn" href="/">← Back to Home</a>
  </div>

  <script>

    // Current user info (loaded on init)
    let currentUser = null;
    
    // Auth check
    function isAuthenticated() {
      return currentUser !== null;
    }
    
    function canEditCategories() {
      return currentUser && currentUser.role === "admin";
    }
    
    function canViewCategories() {
      // Everyone can view categories (including guest)
      return isAuthenticated();
    }
    
    // App config (for category tooltips)
    let appConfig = null;
    
    // Base path for all API calls and links (empty string = root, or "/subpath")
    function basePath() {
      return appConfig?.basePath || '';
    }
    
    async function checkAuth() {
      try {
        // Load config for tooltips - try to detect basePath from URL
        const pathParts = window.location.pathname.split('/').filter(p => p);
        // Remove 'view' from the end if present
        const viewIndex = pathParts.indexOf('view');
        const basePathParts = viewIndex >= 0 ? pathParts.slice(0, viewIndex) : pathParts.slice(0, -1);
        
        let configLoaded = false;
        for (let i = basePathParts.length; i >= 0; i--) {
          const tryPath = '/' + basePathParts.slice(0, i).join('/');
          const tryUrl = (tryPath === '/' ? '' : tryPath) + '/api/config';
          try {
            const configRes = await fetch(tryUrl);
            if (configRes.ok) {
              appConfig = await configRes.json();
              // If basePath not in config, infer from working URL
              if (!appConfig.basePath && tryPath !== '/') {
                appConfig.basePath = tryPath;
              }
              break;
            }
          } catch(e) {}
        }
        
        const res = await fetch(basePath() + '/api/me');
        if (res.ok) {
          currentUser = await res.json();
          // Update page title from config
          document.title = appConfig?.title || 'FRVM';
          // Update back button href
          document.querySelector('.back-btn').href = basePath() + '/';
          return true;
        }
      } catch(e) {}
      // Redirect to login
      window.location.href = basePath() + '/';
      return false;
    }

    function getURLParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        cols: parseInt(params.get("c") || "1", 10),
        rows: parseInt(params.get("r") || "1", 10),
        expr: params.get("expr") || null,
      };
    }

    function applyGrid(grid, cols, rows) {
      grid.style.setProperty("--cols", cols);
      grid.style.setProperty("--rows", rows);
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    }

    const fsBtn = document.getElementById("fullscreen-btn");
    function isIOS() {
      return /iP(ad|hone|od)/.test(navigator.userAgent);
    }
    if (isIOS()) {
      fsBtn.style.display = "none";
    }
    fsBtn.addEventListener("click", async () => {
      const activeVideo = document.querySelector("video");

      if (!document.fullscreenElement) {
        try {
          if (isIOS()) {
            await document.documentElement.requestFullscreen();
          } else {
            await document.getElementById("grid").requestFullscreen();
          }
        } catch (err) {
          if (activeVideo?.webkitEnterFullscreen) {
            activeVideo.webkitEnterFullscreen();
          }
        }
      } else {
        document.exitFullscreen();
      }
    });


    async function createPlayer(container) {
      const wrapper = document.createElement("div");
      wrapper.className = "player-wrapper";

      const posterLayer = document.createElement("div");
      posterLayer.className = "poster-layer";

      const toaster = document.createElement("div");
      toaster.className = "toaster";

      const timelineBar = document.createElement("div");
      timelineBar.className = "timeline-bar";
      const timelineProgress = document.createElement("div");
      timelineProgress.className = "timeline-progress";
      timelineBar.appendChild(timelineProgress);

      const categoriesPanel = document.createElement("div");
      categoriesPanel.className = "categories-panel";

      const performersPanel = document.createElement("div");
      performersPanel.className = "performers-panel";

      const performerIndicator = document.createElement("div");
      performerIndicator.className = "performer-indicator";
      performerIndicator.addEventListener("pointerdown", e => e.stopPropagation());
      performerIndicator.addEventListener("click", e => {
        e.stopPropagation();
        if (performersPanel.classList.contains("visible")) {
          hidePerformersPanel();
        } else {
          showPerformersPanel();
        }
      });

      const video = document.createElement("video");
      video.muted = true;
      video.playsInline = true;
      video.autoplay = false;
      video.controls = false;
      video.preload = "auto";

      wrapper.appendChild(video);
      wrapper.appendChild(posterLayer);
      wrapper.appendChild(toaster);
      wrapper.appendChild(timelineBar);
      wrapper.appendChild(categoriesPanel);
      wrapper.appendChild(performersPanel);
      wrapper.appendChild(performerIndicator);
      container.appendChild(wrapper);

      let playlist = [];
      let allCategories = [];
      let currentVideoCats = {};
      let currentVideoId = null;
      let currentVideoPerformers = [];  // list of performer names for current video
      let pendingPerformers = null;     // null = no changes, array = pending state
      let index = 0;

      function getOrientation() {
        const { cols, rows } = getURLParams();
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const ratio = (vw / vh) * (rows / cols);
        if (ratio < 0.8) return "portrait";
        if (ratio > 1.2) return "landscape";
        return "square";
      }

      async function fetchPlaylist() {
        const orientation = getOrientation();
        const { expr } = getURLParams();
        let url = basePath() + `/api/videos?orientation=${orientation}`;
        if (expr) {
          url += `&expr=${encodeURIComponent(expr)}`;
        }
        try {
          const res = await fetch(url);
          const data = await res.json();
          allCategories = data.categories || [];
          playlist = data.videos || [];
          index = 0;
          
          // Show/hide no results overlay
          const overlay = document.getElementById('noResultsOverlay');
          if (playlist.length === 0) {
            overlay.classList.remove('hidden');
          } else {
            overlay.classList.add('hidden');
          }
        } catch (e) {
          console.error("Failed to fetch playlist:", e);
          playlist = [];
          document.getElementById('noResultsOverlay').classList.remove('hidden');
        }
      }

      // Pending edits (will be sent on validate)
      let pendingCats = {};

      function cycleCatState(emoji, reverse = false) {
        const current = pendingCats[emoji] ?? currentVideoCats[emoji] ?? "UNSET";
        
        if (reverse) {
          // Right click: UNSET → NO → YES → UNSET
          if (current === "UNSET" || current === undefined) {
            pendingCats[emoji] = "NO";
          } else if (current === "NO") {
            pendingCats[emoji] = "YES";
          } else {
            pendingCats[emoji] = "UNSET";
          }
        } else {
          // Left click: UNSET → YES → NO → UNSET
          if (current === "UNSET" || current === undefined) {
            pendingCats[emoji] = "YES";
          } else if (current === "YES") {
            pendingCats[emoji] = "NO";
          } else {
            pendingCats[emoji] = "UNSET";
          }
        }
      }

      function updateCategoriesPanel() {
        categoriesPanel.innerHTML = "";
        
        // Merge current video cats with pending edits
        const displayCats = { ...currentVideoCats, ...pendingCats };
        
        // Get tooltips from config
        const tooltips = appConfig?.categories || {};
        
        for (const emoji of allCategories) {
          const badge = document.createElement("span");
          badge.className = "cat-badge";
          badge.textContent = emoji;
          badge.dataset.emoji = emoji;
          
          // Add tooltip if available
          if (tooltips[emoji]) {
            badge.title = tooltips[emoji];
          }
          
          const state = displayCats[emoji];
          if (state === "YES") {
            badge.classList.add("yes");
          } else if (state === "NO") {
            badge.classList.add("no");
          }
          
          // Prevent SwipeDetector from capturing pointer events on badges
          badge.addEventListener("pointerdown", (e) => {
            e.stopPropagation();
          });
          
          // Prevent context menu on right click
          badge.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            e.stopPropagation();
          });
          
          // Left click: cycle UNSET → YES → NO → UNSET (admin only)
          badge.addEventListener("click", (e) => {
            e.stopPropagation();
            if (!canEditCategories()) return;
            cycleCatState(emoji, false);
            updateCategoriesPanel();
          });
          
          // Right click: cycle reverse UNSET → NO → YES → UNSET (admin only)
          badge.addEventListener("mousedown", (e) => {
            if (e.button === 2) { // Right click
              e.stopPropagation();
              e.preventDefault();
              if (!canEditCategories()) return;
              cycleCatState(emoji, true);
              updateCategoriesPanel();
            }
          });
          
          // Long press for mobile tooltip
          const tooltip = tooltips[emoji] || emoji;
          setupLongPressTooltip(badge, emoji, tooltip);
          
          categoriesPanel.appendChild(badge);
        }
        
        // Validate button (only visible for admin)
        if (canEditCategories()) {
          const validateBtn = document.createElement("button");
          validateBtn.className = "validate-btn";
          validateBtn.textContent = "✓";
          
          // Prevent SwipeDetector from capturing pointer events
          validateBtn.addEventListener("pointerdown", (e) => {
            e.stopPropagation();
          });
          
          validateBtn.addEventListener("click", async (e) => {
            e.stopPropagation();
            if (!canEditCategories()) return;
            await saveCategories();
            await savePerformers();
            // Keep panel open and go to next video for faster tagging
            playNext();
            // Panel stays visible, will update with new video's categories
          });
          categoriesPanel.appendChild(validateBtn);
        }
      }

      async function saveCategories() {
        if (Object.keys(pendingCats).length === 0) return;
        
        const videoId = currentVideoId;
        if (!videoId) return;
        
        try {
          await fetch(basePath() + `/video/${encodeURIComponent(videoId)}/categories`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pendingCats)
          });
          
          // Merge into currentVideoCats
          for (const [emoji, state] of Object.entries(pendingCats)) {
            if (state === "UNSET") {
              delete currentVideoCats[emoji];
            } else {
              currentVideoCats[emoji] = state;
            }
          }
          pendingCats = {};
        } catch (e) {
          console.error("Failed to save categories:", e);
        }
      }

      function showCategoriesPanel() {
        // Only user and admin can access category panel (not guest)
        if (!canViewCategories()) {
          flashToaster("🔒");
          return;
        }
        pendingCats = {};
        updateCategoriesPanel();
        categoriesPanel.classList.add("visible");
        // Adjust size after panel is visible
        requestAnimationFrame(() => {
          requestAnimationFrame(() => adjustCategoriesPanelSize());
        });
      }

      function hideCategoriesPanel() {
        pendingCats = {};
        categoriesPanel.classList.remove("visible");
      }

      function adjustCategoriesPanelSize() {
        adjustPanelSize(categoriesPanel, '.cat-badge');
      }

      // ---- Performers Panel ----

      function getAllPerformers() {
        return appConfig?.performers || {};
      }

      function updatePerformerIndicator() {
        const perfs = (pendingPerformers ?? currentVideoPerformers).filter(p => p !== "_none");
        if (perfs.length > 0) {
          performerIndicator.textContent = "👤" + perfs.length;
          performerIndicator.classList.add("visible");
        } else {
          performerIndicator.classList.remove("visible");
        }
      }

      function updatePerformersPanel() {
        performersPanel.innerHTML = "";
        const allPerfs = getAllPerformers();
        const perfNames = Object.keys(allPerfs);
        if (perfNames.length === 0) return;

        const currentPerfs = new Set(pendingPerformers ?? currentVideoPerformers);

        if (canEditCategories()) {
          // Admin view: "none" badge — ternary state:
          //   - undecided (no style): admin hasn't decided yet (no performers set, no explicit none)
          //   - active (green): admin explicitly marked "no performers" (_none in list)
          //   - inactive (dashed): there ARE performers assigned, so "none" doesn't apply
          const hasExplicitNone = currentPerfs.has("_none");
          const hasRealPerformers = [...currentPerfs].some(p => p !== "_none");
          const noneBadge = document.createElement("span");
          if (hasExplicitNone) {
            noneBadge.className = "perf-badge active";
          } else if (hasRealPerformers) {
            noneBadge.className = "perf-badge inactive";
          } else {
            noneBadge.className = "perf-badge"; // undecided — no outline
          }
          noneBadge.dataset.name = "none";
          noneBadge.textContent = "\u2205";
          noneBadge.style.fontSize = "1.5em";
          noneBadge.style.padding = "8px 12px";
          noneBadge.addEventListener("pointerdown", e => e.stopPropagation());
          noneBadge.addEventListener("click", e => {
            e.stopPropagation();
            if (!pendingPerformers) pendingPerformers = [...currentVideoPerformers];
            const noneIdx = pendingPerformers.indexOf("_none");
            if (noneIdx >= 0) {
              // Was explicit none → remove it (back to undecided)
              pendingPerformers.splice(noneIdx, 1);
            } else {
              // Set explicit none: clear all real performers, add _none
              pendingPerformers = ["_none"];
            }
            updatePerformersPanel();
            updatePerformerIndicator();
          });
          performersPanel.appendChild(noneBadge);

          // Admin view: show ALL performers, toggle active/inactive
          for (const name of perfNames) {
            const info = allPerfs[name];
            const badge = createPerfBadge(name, info, currentPerfs.has(name));

            badge.addEventListener("pointerdown", e => e.stopPropagation());
            badge.addEventListener("contextmenu", e => { e.preventDefault(); e.stopPropagation(); });

            // Click to toggle
            badge.addEventListener("click", e => {
              e.stopPropagation();
              if (!pendingPerformers) pendingPerformers = [...currentVideoPerformers];
              const idx = pendingPerformers.indexOf(name);
              if (idx >= 0) {
                pendingPerformers.splice(idx, 1);
              } else {
                pendingPerformers.push(name);
                // Remove _none if adding a real performer
                const noneIdx = pendingPerformers.indexOf("_none");
                if (noneIdx >= 0) pendingPerformers.splice(noneIdx, 1);
              }
              updatePerformersPanel();
              updatePerformerIndicator();
            });

            // Long press: show links (admin)
            setupPerfLongPress(badge, name, info);

            performersPanel.appendChild(badge);
          }
        } else {
          // User/guest view: show only performers associated with this video
          for (const name of currentPerfs) {
            const info = allPerfs[name];
            if (!info) continue;
            const badge = createPerfBadge(name, info, true);

            badge.addEventListener("pointerdown", e => e.stopPropagation());

            // Click: show links (user)
            badge.addEventListener("click", e => {
              e.stopPropagation();
              showPerfLinksPopup(name, info);
            });

            performersPanel.appendChild(badge);
          }
        }

        // Validate button for admin (saves both categories AND performers)
        if (canEditCategories()) {
          const validateBtn = document.createElement("button");
          validateBtn.className = "validate-btn";
          validateBtn.textContent = "✓";
          validateBtn.addEventListener("pointerdown", e => e.stopPropagation());
          validateBtn.addEventListener("click", async e => {
            e.stopPropagation();
            await saveCategories();
            await savePerformers();
            playNext();
          });
          performersPanel.appendChild(validateBtn);
        }

        // Adjust size
        requestAnimationFrame(() => {
          requestAnimationFrame(() => adjustPanelSize(performersPanel, '.perf-badge'));
        });
      }

      function createPerfBadge(name, info, isActive) {
        const badge = document.createElement("span");
        badge.className = "perf-badge" + (isActive ? " active" : " inactive");
        badge.dataset.name = name;

        if (info?.avatar) {
          const img = document.createElement("img");
          img.src = info.avatar;
          img.alt = name;
          img.draggable = false;
          badge.appendChild(img);
        }

        return badge;
      }

      function setupPerfLongPress(element, name, info) {
        let timer = null;
        element.addEventListener("touchstart", () => {
          timer = setTimeout(() => showPerfLinksPopup(name, info), 500);
        }, { passive: true });
        element.addEventListener("touchend", () => clearTimeout(timer));
        element.addEventListener("touchmove", () => clearTimeout(timer));
      }

      function showPerfLinksPopup(name, info) {
        // Remove any existing popup
        closePerfLinksPopup();

        const backdrop = document.createElement("div");
        backdrop.className = "perf-links-backdrop";
        backdrop.id = "perfLinksBackdrop";
        backdrop.addEventListener("click", closePerfLinksPopup);

        const popup = document.createElement("div");
        popup.className = "perf-links-popup";
        popup.id = "perfLinksPopup";

        // Header with avatar and name
        const header = document.createElement("div");
        header.className = "perf-popup-header";
        if (info?.avatar) {
          const img = document.createElement("img");
          img.src = info.avatar;
          img.alt = name;
          header.appendChild(img);
        }
        const nameEl = document.createElement("span");
        nameEl.className = "name";
        nameEl.textContent = name;
        header.appendChild(nameEl);
        popup.appendChild(header);

        // Links
        const urls = info?.urls || [];
        if (urls.length > 0) {
          for (const url of urls) {
            const a = document.createElement("a");
            a.href = url;
            a.target = "_blank";
            a.rel = "noopener";
            // Show domain as text
            try { a.textContent = new URL(url).hostname + new URL(url).pathname; }
            catch { a.textContent = url; }
            popup.appendChild(a);
          }
        } else {
          const p = document.createElement("p");
          p.style.color = "#666";
          p.textContent = "No links available";
          popup.appendChild(p);
        }

        // Close button
        const closeBtn = document.createElement("button");
        closeBtn.className = "close-btn";
        closeBtn.textContent = "✕";
        closeBtn.addEventListener("click", closePerfLinksPopup);
        popup.appendChild(closeBtn);

        document.body.appendChild(backdrop);
        document.body.appendChild(popup);
      }

      function closePerfLinksPopup() {
        document.getElementById("perfLinksBackdrop")?.remove();
        document.getElementById("perfLinksPopup")?.remove();
      }

      function showPerformersPanel() {
        if (!isAuthenticated()) return;
        if (Object.keys(getAllPerformers()).length === 0) return;
        updatePerformersPanel();
        performersPanel.classList.add("visible");
        requestAnimationFrame(() => {
          requestAnimationFrame(() => adjustPanelSize(performersPanel, '.perf-badge'));
        });
      }

      function hidePerformersPanel() {
        pendingPerformers = null;
        performersPanel.classList.remove("visible");
      }

      async function savePerformers() {
        if (!pendingPerformers) return;

        const videoId = currentVideoId;
        if (!videoId) return;

        try {
          await fetch(basePath() + `/video/${encodeURIComponent(videoId)}/performers`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ performers: pendingPerformers })
          });
          currentVideoPerformers = [...pendingPerformers];
          pendingPerformers = null;
        } catch (e) {
          console.error("Failed to save performers:", e);
        }
      }

      // ---- End Performers Panel ----

      function showPoster(url) {
        posterLayer.style.backgroundImage = `url(${url})`;
        posterLayer.offsetHeight;
        posterLayer.classList.add("visible");
      }

      function hidePoster(nextPosterUrl) {
        posterLayer.classList.remove("visible");
        if (nextPosterUrl) {
          posterLayer.style.backgroundImage = `url(${nextPosterUrl})`;
        }
      }

      function displayToaster(text) {
        toaster.innerText = text;
        toaster.classList.add("visible");
      }

      function flushToaster(text) {
        toaster.innerText = text;
        toaster.classList.remove("visible")
      }
      
      let flashToasterTimer = null;
      function flashToaster(text) {
        if (flashToasterTimer) clearTimeout(flashToasterTimer);
        displayToaster(text);
        flashToasterTimer = setTimeout(() => {
          flushToaster(text);
          flashToasterTimer = null;
        }, 1000);
      }

      async function playNext() {
        if (index >= playlist.length) {
          await fetchPlaylist();
        }

        const item = playlist[index++];
        if (!item) return;

        // Remember if panels were visible
        const catPanelWasVisible = categoriesPanel.classList.contains("visible");
        const perfPanelWasVisible = performersPanel.classList.contains("visible");

        // Store current video info
        currentVideoId = item.id;
        currentVideoCats = item.cats || {};
        currentVideoPerformers = item.performers || [];
        pendingCats = {};
        pendingPerformers = null;

        // Update panels if they were visible (keep open for fast tagging)
        if (catPanelWasVisible) {
          updateCategoriesPanel();
        }
        if (perfPanelWasVisible) {
          updatePerformersPanel();
        }

        // Update performer indicator
        updatePerformerIndicator();

        timelineProgress.style.width = "0%";
        showPoster(item.poster);
        video.src = item.url;
        video.load();

        // Remove any stale error handler before adding a new one
        if (video._errorHandler) {
          video.removeEventListener("error", video._errorHandler);
        }
        const handleError = () => {
          console.warn("Video error, skipping...");
          video.removeEventListener("error", handleError);
          video._errorHandler = null;
          playNext();
        };
        video._errorHandler = handleError;
        video.addEventListener("error", handleError);

        video.onloadeddata = () => {
          const next = playlist[index];
          hidePoster(next?.poster);
          video.play();
        };
      }

      await fetchPlaylist();
      await playNext();

      video.addEventListener("timeupdate", () => {
        if (video.duration) {
          const progress = (video.currentTime / video.duration) * 100;
          timelineProgress.style.width = `${progress}%`;
        }
      });

      video.addEventListener("ended", () => {
        timelineProgress.style.width = "0%";
        
        // Admin: loop video if any edit panel is open
        const anyPanelOpen = categoriesPanel.classList.contains("visible") || performersPanel.classList.contains("visible");
        if (anyPanelOpen && canEditCategories()) {
          video.currentTime = 0;
          video.play();
          return;
        }
        
        // Auto-advance to next video
        const next = playlist[index];
        showPoster(next?.poster);
        playNext();
      });

      // Swipe gestures
      const swipe = new SwipeDetector({
        element: wrapper,

        allowedDirections: [
          "right",
          "up",
          "up-right",
          "up-left",
          "down-right",
          "down-left",
          "left",
          "down",
        ],

        resistance: 0.2,

        onMove({ dx, dy, distance, quadrant }) {
          wrapper.style.transform = `translate(${dx}px, ${dy}px)`;
          // Track initial panel states
          if (wrapper.dataset.panelWasVisible === undefined || wrapper.dataset.panelWasVisible === "") {
            wrapper.dataset.panelWasVisible = categoriesPanel.classList.contains("visible") ? "true" : "false";
            wrapper.dataset.perfPanelWasVisible = performersPanel.classList.contains("visible") ? "true" : "false";
          }
          // Pull panel proportionally during swipe down
          if (dy > 0) {
            const isLeft = quadrant === "tl" || quadrant === "bl";
            if (canEditCategories() && isLeft && wrapper.dataset.perfPanelWasVisible !== "true") {
              // Admin swipe left half → performers panel (from bottom)
              const perfHeight = performersPanel.offsetHeight || 60;
              const perfOffset = Math.min(dy * 2, perfHeight);
              performersPanel.style.transform = `translateY(calc(100% - ${perfOffset}px))`;
            } else if (wrapper.dataset.panelWasVisible !== "true") {
              // Right half (admin) or any side (non-admin) → categories panel (from top)
              const catHeight = categoriesPanel.offsetHeight || 60;
              const catOffset = Math.min(dy * 2, catHeight);
              categoriesPanel.style.transform = `translateY(calc(-100% + ${catOffset}px))`;
            }
          }
        },

        onDetect({ direction, distance, quadrant }) {
          wrapper.dataset.swipe = direction;
          wrapper.dataset.swipeQuadrant = quadrant;
          switch (direction) {
            case "up-right":
            case "up-left":
              displayToaster(!video.muted ? "🔇" : "🔊");
              break;
            case "down-right":
            case "down-left":
              // Preview: show what mode we'll switch TO
              displayToaster(video.classList.contains("contain") ? "📺" : "🖼️");
              break;
            case "left":
              video.pause();
              displayToaster("⏮️");
              break;
            case "right":
              video.playbackRate = 2;
              displayToaster("⏩");
              break;
            case "up":
              displayToaster("⏭️");
              break;
            case "down": {
              const isLeft = quadrant === "tl" || quadrant === "bl";
              if (canEditCategories() && isLeft) {
                // Admin left half → performers
                if (performersPanel.classList.contains("visible")) {
                  // Will hide on onEnd
                } else {
                  showPerformersPanel();
                }
              } else {
                // Right half (admin) or any side (non-admin) → categories
                if (categoriesPanel.classList.contains("visible")) {
                  // Will hide on onEnd
                } else {
                  showCategoriesPanel();
                }
              }
              break;
            }
          }
        },

        onEnd({ direction, distance, duration, quadrant }) {
          switch (direction) {
            case "up-right":
            case "up-left":
              video.muted = !video.muted;
              flashToaster(video.muted ? "🔇" : "🔊");
              break;
            case "down-right":
            case "down-left":
              // Toggle object-fit: cover <-> contain
              video.classList.toggle("contain");
              flashToaster(video.classList.contains("contain") ? "🖼️" : "📺");
              break;
            case "up":
              video.pause();
              playNext();
              break;
            case "left":
              video.currentTime = 0;
              video.play();
              flashToaster("▶️");
              break;
            case "right":
              video.playbackRate = 1;
              flashToaster("▶️");
              break;
            case "down": {
              const isLeft = quadrant === "tl" || quadrant === "bl";
              if (canEditCategories() && isLeft) {
                // Admin left half → toggle performers panel
                if (wrapper.dataset.perfPanelWasVisible === "true") {
                  hidePerformersPanel();
                }
              } else {
                // Right half (admin) or any side (non-admin) → toggle categories panel
                if (wrapper.dataset.panelWasVisible === "true") {
                  hideCategoriesPanel();
                }
              }
              break;
            }
          }
          wrapper.style.transform = "";
          wrapper.dataset.swipe = "";
          wrapper.dataset.swipeQuadrant = "";
          wrapper.dataset.panelWasVisible = "";
          wrapper.dataset.perfPanelWasVisible = "";
          categoriesPanel.style.transform = "";
          performersPanel.style.transform = "";
        },

        onCancel() {
          switch (wrapper.dataset.swipe) {
            case "up-right":
            case "up-left":
              flashToaster(video.muted ? "🔇" : "🔊");
              break;
            case "down-right":
            case "down-left":
              // Cancel: show current mode (no change)
              flashToaster(video.classList.contains("contain") ? "🖼️" : "📺");
              break;
            case "up":
              flashToaster("▶️");
              break;
            case "left":
              video.play();
              flashToaster("▶️");
              break;
            case "right":
              video.playbackRate = 1;
              flashToaster("▶️");
              break;
            case "down": {
              const q = wrapper.dataset.swipeQuadrant;
              const isLeft = q === "tl" || q === "bl";
              if (canEditCategories() && isLeft) {
                hidePerformersPanel();
              } else {
                hideCategoriesPanel();
              }
              break;
            }
          }
          wrapper.style.transform = "";
          wrapper.dataset.swipe = "";
          wrapper.dataset.swipeQuadrant = "";
          wrapper.dataset.panelWasVisible = "";
          wrapper.dataset.perfPanelWasVisible = "";
          categoriesPanel.style.transform = "";
          performersPanel.style.transform = "";
        }
      });
    }

    function createGrid() {
      const { cols, rows } = getURLParams();
      const grid = document.getElementById("grid");
      applyGrid(grid, cols, rows);

      for (let i = 0; i < cols * rows; i++) {
        const cell = document.createElement("div");
        createPlayer(cell);
        grid.appendChild(cell);
      }
    }

    // Init with auth check
    (async () => {
      if (await checkAuth()) {
        createGrid();
      }
    })();

    // Resize handler for panels - call adjustSize on each visible panel
    window.addEventListener('resize', () => {
      document.querySelectorAll('.categories-panel.visible').forEach(panel => {
        adjustPanelSize(panel, '.cat-badge');
      });
      document.querySelectorAll('.performers-panel.visible').forEach(panel => {
        adjustPanelSize(panel, '.perf-badge');
      });
    });
    
  </script>
</body>
</html>
